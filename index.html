<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Coding since 12 — Minecraft, drones, finance SaaS, health care, freelancing, founder of Cial and OSS contributor."
    />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="alternate" type="application/rss+xml" title="Eliot Maurice" href="%BASE_URL%rss.xml" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist@5.2.8/index.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist-mono@5.2.7/index.min.css"
    />
    <title>Eliot Maurice</title>
    <script>
      // Apply saved theme before first paint to avoid a light flash.
      try {
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.dataset.theme = "dark";
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute("content", "#131019");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
